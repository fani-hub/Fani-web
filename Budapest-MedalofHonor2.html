<script>
// ========================
// 1. ALAP THREE.JS MOTOR
// ========================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ====== TALAJ ======
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshBasicMaterial({color:0x2e8b57})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ====== EGYSZERŰ ÉPÜLETEK ======
for(let i=0;i<20;i++){
  const h = Math.random()*10+2;

  const building = new THREE.Mesh(
    new THREE.BoxGeometry(3,h,3),
    new THREE.MeshBasicMaterial({color:0x555555})
  );

  building.position.set(
    (Math.random()-0.5)*80,
    h/2,
    (Math.random()-0.5)*80
  );

  scene.add(building);
}

// ====== JÁTÉKOS (kamera) ======
camera.position.set(0,2,5);

// ========================
// 2. INPUT RENDSZER
// ========================

let keys = {};

document.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

// ====== MOBIL JOYSTICK ======
let joyX = 0;
let joyY = 0;

const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

let dragging = false;

joystick.addEventListener("touchstart", ()=>dragging=true);

joystick.addEventListener("touchend", ()=>{
  dragging=false;
  joyX=0; joyY=0;
  stick.style.left="35px";
  stick.style.top="35px";
});

joystick.addEventListener("touchmove", (e)=>{
  if(!dragging) return;

  let t = e.touches[0];
  let r = joystick.getBoundingClientRect();

  let x = t.clientX - r.left - 60;
  let y = t.clientY - r.top - 60;

  joyX = x/50;
  joyY = y/50;

  stick.style.left = 35 + x + "px";
  stick.style.top = 35 + y + "px";
});

// ========================
// 3. MOZGÁS
// ========================

function update(){
  const speed = 0.15;

  // PC
  if(keys["w"]) camera.position.z -= speed;
  if(keys["s"]) camera.position.z += speed;
  if(keys["a"]) camera.position.x -= speed;
  if(keys["d"]) camera.position.x += speed;

  // MOBILE
  camera.position.x += joyX * speed;
  camera.position.z += joyY * speed;
}

// ========================
// 4. LOOP
// ========================

function animate(){
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html><script>

// ========================
// FPS KAMERA (LOOK)
// ========================

let pitch = 0;
let yaw = 0;

const sensitivity = 0.002;

// PC egér mozgatás
document.addEventListener("mousemove", (e)=>{
  yaw -= e.movementX * sensitivity;
  pitch -= e.movementY * sensitivity;

  pitch = Math.max(-1.5, Math.min(1.5, pitch));
});

// mobil swipe kamera
let lastTouch = null;

document.addEventListener("touchmove", (e)=>{
  if(e.touches.length !== 1) return;

  let t = e.touches[0];

  if(lastTouch){
    let dx = t.clientX - lastTouch.x;
    let dy = t.clientY - lastTouch.y;

    yaw -= dx * 0.003;
    pitch -= dy * 0.003;

    pitch = Math.max(-1.5, Math.min(1.5, pitch));
  }

  lastTouch = {x:t.clientX, y:t.clientY};
});

document.addEventListener("touchend", ()=>{
  lastTouch = null;
});

// ========================
// LÖVÉS (RAYCAST ALAP)
// ========================

const raycaster = new THREE.Raycaster();

function shoot(){

  raycaster.setFromCamera({x:0,y:0}, camera);

  const intersects = raycaster.intersectObjects(scene.children);

  if(intersects.length > 0){
    const hit = intersects[0].object;

    // ha épület vagy valami
    if(hit){
      hit.material.color.set(0xff0000);

      setTimeout(()=>{
        hit.material.color.set(0x555555);
      }, 200);
    }
  }
}

// PC lövés
document.addEventListener("mousedown", shoot);

// mobil tap = lövés
document.addEventListener("touchstart", (e)=>{
  if(e.touches.length === 1) shoot();
});

// ========================
// UPDATE FELÜLÍRÁS
// ========================

function update(){
  const speed = 0.15;

  if(keys["w"]) camera.position.z -= Math.cos(yaw)*speed;
  if(keys["s"]) camera.position.z += Math.cos(yaw)*speed;
  if(keys["a"]) camera.position.x -= Math.sin(yaw)*speed;
  if(keys["d"]) camera.position.x += Math.sin(yaw)*speed;

  camera.position.x += joyX * speed;
  camera.position.z += joyY * speed;

  // kamera irány
  camera.rotation.set(pitch, yaw, 0);
}

</script>

<!-- célkereszt -->
<div style="
position:fixed;
top:50%;
left:50%;
width:10px;
height:10px;
margin-left:-5px;
margin-top:-5px;
background:white;
border-radius:50%;
"></div><script>

// ========================
// PLAYER ÉLET
// ========================
let health = 100;

// ========================
// ELLENSÉGEK
// ========================
const enemies = [];

function createEnemy(x, z){
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(2,3,2),
    new THREE.MeshBasicMaterial({color:0xff0000})
  );

  mesh.position.set(x,1.5,z);
  scene.add(mesh);

  enemies.push({
    mesh: mesh,
    speed: 0.02
  });
}

// több ellenség
for(let i=0;i<8;i++){
  createEnemy(
    (Math.random()-0.5)*60,
    (Math.random()-0.5)*60
  );
}

// ========================
// AI (KÖVETÉS)
// ========================
function updateEnemies(){

  enemies.forEach(e=>{

    let dx = camera.position.x - e.mesh.position.x;
    let dz = camera.position.z - e.mesh.position.z;

    let dist = Math.sqrt(dx*dx + dz*dz);

    if(dist < 30){ // ha lát
      e.mesh.position.x += dx * e.speed;
      e.mesh.position.z += dz * e.speed;
    }

    // támadás
    if(dist < 2){
      health -= 0.3;
    }
  });
}

// ========================
// LÖVÉS FRISSÍTVE (ELLENSÉG TALÁLAT)
// ========================
function shoot(){

  raycaster.setFromCamera({x:0,y:0}, camera);

  const hits = raycaster.intersectObjects(scene.children);

  if(hits.length > 0){

    const obj = hits[0].object;

    // ellenség találat
    const enemy = enemies.find(e => e.mesh === obj);

    if(enemy){
      scene.remove(enemy.mesh);
      enemies.splice(enemies.indexOf(enemy),1);
      return;
    }

    // fal találat effekt
    obj.material.color.set(0xffff00);
    setTimeout(()=>obj.material.color.set(0x555555),200);
  }
}

// ========================
// HALÁL
// ========================
function checkDeath(){
  if(health <= 0){
    alert("Meghaltál! Újraindítás...");
    location.reload();
  }
}

// ========================
// UPDATE FRISSÍTÉS
// ========================
const oldUpdate = update;

update = function(){
  oldUpdate();
  updateEnemies();
  checkDeath();
};

</script><script>

// ========================
// KÜLDETÉS RENDSZER
// ========================
let objectives = {
  enemiesKilled: 0,
  targetKills: 5,
  suppliesCollected: 0,
  targetSupplies: 3
};

let stars = 0;

// ========================
// UTÁNPÓTLÁS
// ========================
const supplies = [];

function createSupply(x,z,type){
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(1.5,1.5,1.5),
    new THREE.MeshBasicMaterial({
      color: type === "health" ? 0x00ff00 : 0x0000ff
    })
  );

  mesh.position.set(x,0.75,z);
  scene.add(mesh);

  supplies.push({mesh,type});
}

for(let i=0;i<6;i++){
  createSupply(
    (Math.random()-0.5)*60,
    (Math.random()-0.5)*60,
    Math.random()>0.5 ? "health" : "ammo"
  );
}

// ========================
// UTÁNPÓTLÁS FELVÉTEL
// ========================
function checkSupplies(){

  supplies.forEach(s=>{

    let dx = camera.position.x - s.mesh.position.x;
    let dz = camera.position.z - s.mesh.position.z;

    if(Math.sqrt(dx*dx + dz*dz) < 2){

      scene.remove(s.mesh);
      supplies.splice(supplies.indexOf(s),1);

      objectives.suppliesCollected++;

      if(s.type === "health"){
        health = Math.min(100, health + 30);
      }
    }
  });
}

// ========================
// CSILLAG RENDSZER
// ========================
function calculateStars(){

  stars = 1;

  if(health > 70) stars++;
  if(objectives.suppliesCollected >= objectives.targetSupplies) stars++;
}

// ========================
// MINIMAP (EGYSZERŰ RADAR)
// ========================
const minimap = document.createElement("canvas");
minimap.width = 150;
minimap.height = 150;
minimap.style.position = "fixed";
minimap.style.top = "20px";
minimap.style.right = "20px";
minimap.style.border = "2px solid white";
document.body.appendChild(minimap);

const mctx = minimap.getContext("2d");

function drawMinimap(){

  mctx.fillStyle = "black";
  mctx.fillRect(0,0,150,150);

  // játékos
  mctx.fillStyle = "white";
  mctx.fillRect(75,75,4,4);

  // ellenségek
  enemies.forEach(e=>{
    let dx = e.mesh.position.x - camera.position.x;
    let dz = e.mesh.position.z - camera.position.z;

    mctx.fillStyle = "red";
    mctx.fillRect(75 + dx*2, 75 + dz*2, 3, 3);
  });
}

// ========================
// KÜLDETÉS FRISSÍTÉS
// ========================
function updateObjectives(){

  if(objectives.enemiesKilled >= objectives.targetKills){
    calculateStars();
  }
}

// ========================
// UPDATE BELEÉPÍTÉS
// ========================
const oldUpdate2 = update;

update = function(){
  oldUpdate2();

  checkSupplies();
  updateObjectives();
  drawMinimap();
};
