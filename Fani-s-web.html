<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fani's Web</title>
    <style>
        /* Sötét technikai háttér beállítása */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0f1d;
            background-image: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.75)), url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        /* --- MENÜ GOMB (BAL FELSŐ SAROK) --- */
        .menu-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.2s ease;
        }

        .menu-btn:hover {
            transform: scale(1.1);
        }

        /* --- BEÚSZÓ OLDALMENÜ (DRAWER) --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: -300px; /* Alapból rejtve van balra kint */
            width: 300px;
            height: 100%;
            background: rgba(10, 12, 18, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 5px 0 25px rgba(0, 0, 0, 0.5);
            transition: left 0.3s ease-in-out;
            z-index: 90;
            padding-top: 90px;
            display: flex;
            flex-direction: column;
        }

        /* Amikor aktív, beúszik a képernyőre */
        .sidebar.open {
            left: 0;
        }

        /* Menüpontok stílusa */
        .menu-title {
            font-size: 14px;
            text-transform: uppercase;
            color: #888;
            padding: 10px 25px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .menu-link {
            padding: 15px 25px;
            color: #e2e8f0;
            text-decoration: none;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .menu-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #ff9900;
            border-left-color: #ff9900;
            padding-left: 30px;
        }

        /* Háttér sötétítés, ha nyitva van a menü */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            z-index: 80;
        }

        .overlay.show {
            display: block;
        }

        /* --- FŐ CÍM KÖZÉPEN --- */
        .main-title-container {
            text-align: center;
        }

        .logo-icon {
            font-size: 45px;
            color: #ff9900;
            filter: drop-shadow(0 0 10px rgba(255, 153, 0, 0.6));
            margin-bottom: 10px;
            display: inline-block;
        }

        h1 {
            font-size: 64px;
            margin: 0;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 18px;
            color: #ccc;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        /* --- LEBEGŐ FANI HUD PANEL --- */
        .hud-panel {
            position: absolute;
            top: 40px;
            right: 40px;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            width: 260px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .hud-header {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #00d2ff;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .hud-header span {
            color: #ff9900;
        }

        .hud-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: 12px 0;
        }

        .hud-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .hud-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #e2e8f0;
        }

        .hud-item:last-child {
            margin-bottom: 0;
        }

        .hud-icon {
            font-size: 14px;
            width: 18px;
            text-align: center;
        }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div id="sidebar" class="sidebar">
        <div class="menu-title">Navigáció</div>
        <a href="#" class="menu-link">🏠 Főoldal</a>
        <a href="urhajo.html" class="menu-link">🚀 Űrhajós Játék</a>
        <a href="#" class="menu-link">💻 Projektek</a>
        
        <div style="height: 20px;"></div>
        <div class="menu-title">Közösség</div>
        <a href="https://github.com" target="_blank" class="menu-link">🐙 GitHub profil</a>
    </div>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div class="main-title-container">
        <div class="logo-icon">⚡</div>
        <h1>Fani's Web</h1>
        <div class="subtitle">Gamer • LEGO • Tech • Simulator</div>
    </div>

    <div class="hud-panel">
        <div class="hud-header">
            <span>⚡</span> Fani HUD
        </div>
        
        <ul class="hud-list">
            <li class="hud-item">
                <span class="hud-icon">💻</span>
                <span>PC setup: RTX 3050</span>
            </li>
            <li class="hud-item">
                <span class="hud-icon">🧱</span>
                <span>LEGO: 3 készlet</span>
            </li>
            <li class="hud-item">
                <span class="hud-icon">🏎️</span>
                <span>Sim: MOZA</span>
            </li>
        </ul>

        <div class="hud-divider"></div>

        <ul class="hud-list">
            <li class="hud-item">
                <span class="hud-icon">⭐</span>
                <span>Kedvenc: LEGO F1</span>
            </li>
            <li class="hud-item">
                <span class="hud-icon">🧬</span>
                <span>Cél: full setup</span>
            </li>
        </ul>
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }
    </script>

</body>
</html>
