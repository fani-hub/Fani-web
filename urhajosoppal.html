<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fani Eredeti 3D Űrhajó + BOLT 🚀💰</title>
    <style>
        body {
            text-align: center;
            font-family: 'Courier New', monospace;
            background-color: #020208;
            margin: 0;
            padding-top: 10px;
            color: #fff;
            user-select: none;
            overflow: hidden;
        }
        #gameCanvas {
            background-color: #000005;
            border: 3px solid #00d2ff;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
            box-shadow: 0px 0px 25px rgba(0, 210, 255, 0.4);
            max-width: 100%;
            touch-action: none;
        }
        h1 { color: #00d2ff; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0,210,255,0.5); font-size: 20px; }
        p { color: #888; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>Fani Eredeti 3D Űrhajó + BOLT 🚀💰</h1>
    <p>Gép: Nyilak + Szóköz | Teló: Érintsd a Bal/Jobb oldalt a kormányzáshoz</p>
    <canvas id="gameCanvas" width="800" height="550"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- PONTOSAN AZ EREDETI JÁTÉK VÁLTOZÓI ---
        let score = 0;
        let money = 0; // ÚJ: Ezt gyűjtöd a meteorokból!
        let health = 100;
        let isGameOver = false;

        // Bolt fejlesztéseinek mentése
        let hasDoubleLaser = false;
        let hudColor = "#00d2ff"; // Alap kék
        let isGreenSkin = false;

        let shipX = 0;
        let shipY = 0;
        let tilt = 0;

        // Csillagok a háttérben
        let stars = [];
        for(let i=0; i<60; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2 + 1 });
        }

        // Meteorok és lézerek
        let objects = [];
        let spawnTimer = 0;
        let lasers = [];
        let shootTimer = 0;

        // Billentyűzet (Gép)
        let keys = {};
        document.addEventListener("keydown", (e) => {
            keys[e.code] = true;
            if (e.code === "Space" && !isGameOver) {
                shootLaser();
            }
            // Bolt vezérlése gombokkal, ha meghaltál
            if (isGameOver) {
                if (e.code === "Digit1" || e.code === "Numpad1") buyItem('shield', 200);
                if (e.code === "Digit2" || e.code === "Numpad2") buyItem('laser', 400);
                if (e.code === "Digit3" || e.code === "Numpad3") buyItem('skin', 600);
                if (e.code === "Enter") resetGameTotal();
            }
        });
        document.addEventListener("keyup", (e) => keys[e.code] = false);

        // Érintőképernyő (Telefon: Kormányzás és Bolt kattintások)
        let touchX = null;
        canvas.addEventListener("touchstart", (e) => {
            const rect = canvas.getBoundingClientRect();
            let clickX = ((e.touches[0].clientX - rect.left) / rect.width) * canvas.width;
            let clickY = ((e.touches[0].clientY - rect.top) / rect.height) * canvas.height;

            // Ha meghaltál, a bolt menüpontjait lehet megnyomni a képernyőn
            if (isGameOver) {
                if (clickX >= 200 && clickX <= 600 && clickY >= 230 && clickY <= 275) {
                    buyItem('shield', 200);
                }
                else if (clickX >= 200 && clickX <= 600 && clickY >= 290 && clickY <= 335) {
                    buyItem('laser', 400);
                }
                else if (clickX >= 200 && clickX <= 600 && clickY >= 350 && clickY <= 395) {
                    buyItem('skin', 600);
                }
                else if (clickX >= 250 && clickX <= 550 && clickY >= 430 && clickY <= 470) {
                    resetGameTotal();
                }
                return;
            }

            touchX = e.touches[0].clientX;
        });

        canvas.addEventListener("touchmove", (e) => { touchX = e.touches[0].clientX; });
        canvas.addEventListener("touchend", () => { touchX = null; });

        function shootLaser() {
            if (hasDoubleLaser) {
                // Ha megvetted: Szuper 4-es lézer!
                lasers.push({ x: shipX - 0.15, y: shipY, z: 0.1 });
                lasers.push({ x: shipX - 0.05, y: shipY, z: 0.1 });
                lasers.push({ x: shipX + 0.05, y: shipY, z: 0.1 });
                lasers.push({ x: shipX + 0.15, y: shipY, z: 0.1 });
            } else {
                // Eredeti alap dupla sugár középről
                lasers.push({ x: shipX - 0.05, y: shipY, z: 0.1 });
                lasers.push({ x: shipX + 0.05, y: shipY, z: 0.1 });
            }
        }

        function spawnObject() {
            // Kizárólag az eredeti kék meteorok jönnek
            objects.push({
                x: Math.random() * 2 - 1,
                y: Math.random() * 2 - 1,
                z: 1,
                size: Math.random() * 30 + 20,
                color: isGreenSkin ? "#00ff66" : "#00d2ff"
            });
        }

        // BOLT MŰKÖDÉSE
        function buyItem(item, price) {
            if (money >= price) {
                money -= price;
                if (item === 'shield') {
                    health = 100;
                    isGameOver = false; // Folytatás azonnal a pontok megtartásával!
                    objects = []; lasers = [];
                    update();
                }
                else if (item === 'laser') {
                    hasDoubleLaser = true;
                }
                else if (item === 'skin') {
                    isGreenSkin = true;
                    hudColor = "#00ff66"; // Átvált neon zöldre minden műszer
                }
            }
        }

        function resetGameTotal() {
            score = 0; money = 0; health = 100; isGameOver = false;
            shipX = 0; shipY = 0; tilt = 0; objects = []; lasers = [];
            hasDoubleLaser = false; hudColor = "#00d2ff"; isGreenSkin = false;
            update();
        }

        function update() {
            if (isGameOver) {
                drawShopScreen();
                return;
            }

            // Háttér csillagok mozgása
            stars.forEach(star => { star.y += 2; if (star.y > canvas.height) star.y = 0; });

            // Eredeti finom mozgás és dőlés
            let moveSpeed = 0.04;
            if (keys["ArrowLeft"]) { shipX -= moveSpeed; tilt += (-0.15 - tilt) * 0.2; }
            else if (keys["ArrowRight"]) { shipX += moveSpeed; tilt += (0.15 - tilt) * 0.2; }
            else if (touchX !== null) {
                const rect = canvas.getBoundingClientRect();
                let relativeX = touchX - rect.left;
                if (relativeX < rect.width / 2) { shipX -= moveSpeed; tilt += (-0.15 - tilt) * 0.2; }
                else { shipX += moveSpeed; tilt += (0.15 - tilt) * 0.2; }
            } else { tilt += (0 - tilt) * 0.1; }

            if (keys["ArrowUp"]) shipY -= moveSpeed;
            if (keys["ArrowDown"]) shipY += moveSpeed;

            if (shipX < -0.9) shipX = -0.9; if (shipX > 0.9) shipX = 0.9;
            if (shipY < -0.7) shipY = -0.7; if (shipY > 0.7) shipY = 0.7;

            // Automata lövés telón
            shootTimer++;
            if (touchX !== null && shootTimer % 12 === 0) { shootLaser(); }

            // Meteorok időzítése
            spawnTimer++;
            if (spawnTimer % 20 === 0) { spawnObject(); }

            lasers.forEach((laser, lIdx) => { laser.z += 0.05; if (laser.z > 1) lasers.splice(lIdx, 1); });

            objects.forEach((obj, oIdx) => {
                obj.z -= 0.015; // Eredeti, jól megszokott sebesség

                // Találat ellenőrzése
                lasers.forEach((laser, lIdx) => {
                    if (Math.abs(laser.x - obj.x) < 0.2 && Math.abs(laser.y - obj.y) < 0.2 && Math.abs(laser.z - obj.z) < 0.1) {
                        objects.splice(oIdx, 1);
                        lasers.splice(lIdx, 1);
                        score += 50;
                        money += 50; // MINDEN PONTÉRT KAPSZ $50-t IS!
                    }
                });

                // Becsapódás a pilótafülkébe
                if (obj.z <= 0.05) {
                    if (Math.abs(obj.x - shipX) < 0.35 && Math.abs(obj.y - shipY) < 0.35) {
                        health -= 25;
                        if (health <= 0) isGameOver = true;
                    }
                    objects.splice(oIdx, 1);
                }
            });

            // --- RAJZOLÁS (PONTOSAN AZ EREDETI NÉZET ÉS DIZÁJN) ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff"; stars.forEach(star => ctx.fillRect(star.x, star.y, star.size, star.size));

            objects.forEach(obj => {
                let screenX = (canvas.width / 2) + (obj.x - shipX) * (1 / obj.z) * 200;
                let screenY = (canvas.height / 2) + (obj.y - shipY) * (1 / obj.z) * 150;
                let currentSize = obj.size * (1 / obj.z) * 0.5;

                if (obj.z > 0.05 && currentSize > 0) {
                    ctx.fillStyle = obj.color;
                    ctx.shadowBlur = 15; ctx.shadowColor = obj.color;
                    ctx.beginPath(); ctx.arc(screenX, screenY, currentSize / 2, 0, Math.PI * 2); ctx.fill();
                    ctx.shadowBlur = 0;
                }
            });

            ctx.strokeStyle = hasDoubleLaser ? "#ffcc00" : "#ff0055"; ctx.lineWidth = hasDoubleLaser ? 5 : 4;
            lasers.forEach(laser => {
                let sX = (canvas.width / 2) + (laser.x - shipX) * (1 / laser.z) * 200;
                let sY = (canvas.height / 2) + (laser.y - shipY) * (1 / laser.z) * 150;
                ctx.beginPath(); ctx.moveTo(sX, sY); ctx.lineTo(sX, sY - 15); ctx.stroke();
            });

            // EREDETI PILÓTAFÜLKE (COCKPIT)
            ctx.save(); ctx.translate(canvas.width / 2, canvas.height / 2); ctx.rotate(tilt);
            ctx.strokeStyle = "#12131a"; ctx.lineWidth = 25; ctx.strokeRect(-canvas.width/2 + 20, -canvas.height/2 + 20, canvas.width - 40, canvas.height - 100);

            // Célkereszt középen
            ctx.strokeStyle = hudColor; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-40, 0); ctx.lineTo(-15, 0); ctx.moveTo(15, 0); ctx.lineTo(40, 0); ctx.stroke();

            // Alsó műszerfal panel
            ctx.fillStyle = "#0a0b10"; ctx.beginPath(); ctx.moveTo(-canvas.width/2, canvas.height/2); ctx.lineTo(-300, canvas.height/2 - 80); ctx.lineTo(300, canvas.height/2 - 80); ctx.lineTo(canvas.width/2, canvas.height/2); ctx.closePath(); ctx.fill();
            ctx.strokeStyle = hudColor; ctx.stroke();

            // Pajzs csík
            ctx.fillStyle = "#333"; ctx.fillRect(-250, canvas.height/2 - 50, 120, 15);
            ctx.fillStyle = health > 30 ? "#00ff66" : "#ff3333"; ctx.fillRect(-250, canvas.height/2 - 50, (health / 100) * 120, 15);
            ctx.fillStyle = "#fff"; ctx.font = "bold 11px Arial"; ctx.fillText("PAJZS: " + health + "%", -240, canvas.height/2 - 38);

            // Pénz és Pont kijelzés a műszerfalon
            ctx.fillStyle = "#ffcc00"; ctx.font = "bold 13px 'Courier New'"; ctx.fillText("PÉNZ: $" + money, -70, canvas.height/2 - 38);
            ctx.fillStyle = hudColor; ctx.font = "bold 13px 'Courier New'"; ctx.fillText("PONT: " + score, 140, canvas.height/2 - 38);
            ctx.restore();

            requestAnimationFrame(update);
        }

        // AZ ÚJ BEÉPÍTETT BOLT ABLAK (Amikor meghalsz, ez ugrik fel)
        function drawShopScreen() {
            ctx.fillStyle = "rgba(0, 0, 5, 0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "#ff3355"; ctx.lineWidth = 4;
            ctx.strokeRect(150, 50, 500, 440);
            ctx.fillStyle = "#0b0c16"; ctx.fillRect(150, 50, 500, 440);

            ctx.fillStyle = "#ff3355"; ctx.font = "bold 26px 'Courier New'";
            ctx.fillText("ŰRHAJÓ MEGSEMMISÜLT!", 240, 100);

            ctx.fillStyle = "#ffcc00"; ctx.font = "bold 20px 'Courier New'";
            ctx.fillText("ÖSSZES PÉNZED: $" + money, 280, 140);
            ctx.fillStyle = "#fff"; ctx.font = "14px 'Courier New'";
            ctx.fillText("Szerzett pontok: " + score, 310, 170);

            ctx.fillStyle = "#00d2ff"; ctx.font = "bold 18px 'Courier New'";
            ctx.fillText("🛒 PILÓTA SHOP (Bökj a vásárláshoz!)", 220, 210);

            // 1. Gomb: Pajzs újraélesztés (Folytatás)
            ctx.fillStyle = (money >= 200) ? "#1a2438" : "#16171d"; ctx.fillRect(200, 230, 400, 45);
            ctx.strokeStyle = (money >= 200) ? "#00ff66" : "#444"; ctx.lineWidth = 2; ctx.strokeRect(200, 230, 400, 45);
            ctx.fillStyle = "#fff"; ctx.font = "bold 13px Arial"; ctx.fillText("1. FOLYTATÁS (PAJZS ÚJRA 100%)", 220, 250);
            ctx.fillStyle = "#00ff66"; ctx.fillText("Ára: $200", 520, 250);

            // 2. Gomb: Dupla lézer
            ctx.fillStyle = (money >= 400 && !hasDoubleLaser) ? "#1a2438" : "#16171d"; ctx.fillRect(200, 290, 400, 45);
            ctx.strokeRect(200, 290, 400, 45);
            ctx.fillStyle = hasDoubleLaser ? "#888" : "#fff";
            ctx.fillText(hasDoubleLaser ? "2. DUPLA ÁGYÚ BESZERELVE ✓" : "2. DUPLA PLAZMA ÁGYÚ (4 LÉZER)", 220, 310);
            if (!hasDoubleLaser) { ctx.fillStyle = "#00ff66"; ctx.fillText("Ára: $400", 520, 310); }

            // 3. Gomb: Zöld Cockpit dizájn
            ctx.fillStyle = (money >= 600 && !isGreenSkin) ? "#1a2438" : "#16171d"; ctx.fillRect(200, 350, 400, 45);
            ctx.strokeRect(200, 350, 400, 45);
            ctx.fillStyle = isGreenSkin ? "#888" : "#fff";
            ctx.fillText(isGreenSkin ? "3. NEON ZÖLD MOD AKTÍV ✓" : "3. NEON ZÖLD KIJELZŐK", 220, 370);
            if (!isGreenSkin) { ctx.fillStyle = "#00ff66"; ctx.fillText("Ára: $600", 520, 370); }

            // Teljesen új játék indítása elölről
            ctx.fillStyle = "#ff3355"; ctx.fillRect(250, 430, 300, 40);
            ctx.fillStyle = "#fff"; ctx.font = "bold 14px 'Courier New'";
            ctx.fillText("TELJESEN ÚJ JÁTÉK (ENTER)", 295, 455);

            requestAnimationFrame(drawShopScreen);
        }

        update();
    </script>

</body>
</html>
