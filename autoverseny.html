<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fani Autós Szimulátor 🏎️</title>
    <style>
        body {
            text-align: center;
            font-family: 'Courier New', monospace;
            background-color: #0b0f19;
            margin: 0;
            padding-top: 10px;
            color: #fff;
            user-select: none;
            overflow: hidden;
        }
        #gameCanvas {
            background-color: #87ceeb; /* Égbolt kék */
            border: 4px solid #ff3366;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
            box-shadow: 0px 0px 30px rgba(255, 51, 102, 0.3);
            max-width: 100%;
            touch-action: none;
        }
        h1 { color: #ff3366; margin-bottom: 5px; text-shadow: 0 0 10px rgba(255,51,102,0.5); font-size: 20px; }
        p { color: #aaa; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>Fani 3D Műszerfal Autóverseny 🏎️</h1>
    <p>Gép: Nyilak | Teló: Érintsd és tartsd a képernyő Bal / Jobb szélét a kormányzáshoz</p>
    <canvas id="gameCanvas" width="800" height="550"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Játék adatok
        let distance = 0;
        let speed = 0;
        let maxSpeed = 200;
        let score = 0;
        let isGameOver = false;
        let isGameWon = false;
        let targetDistance = 2000; // 2000 méter a célpont

        // Játékos pozíciója és az út kanyarodása
        let playerX = 0; // A játékos helyzete az úton (-1 és 1 között)
        let steering = 0; // Kormányzás dőlése visual effektnek
        let roadCurve = 0; // Az út aktuális kanyarodása
        let targetCurve = 0;
        let curveTimer = 0;

        // Tereptárgyak (Fák, szembejövő autók)
        let objects = [];
        let spawnTimer = 0;

        let lastTime = Date.now();

        // Irányítás (Gép)
        let keys = {};
        document.addEventListener("keydown", (e) => {
            keys[e.code] = true;
            if ((e.code === "Space" || e.code === "Enter") && (isGameOver || isGameWon)) {
                resetGame();
                e.preventDefault();
            }
        });
        document.addEventListener("keyup", (e) => keys[e.code] = false);

        // Irányítás (Telefon)
        let touchSteer = 0;
        canvas.addEventListener("touchstart", (e) => {
            if (isGameOver || isGameWon) { resetGame(); return; }
            handleTouch(e);
        });
        canvas.addEventListener("touchmove", (e) => { handleTouch(e); });
        canvas.addEventListener("touchend", () => { touchSteer = 0; });

        function handleTouch(e) {
            const rect = canvas.getBoundingClientRect();
            const touchX = ((e.touches[0].clientX - rect.left) / rect.width) * canvas.width;
            if (touchX < 300) touchSteer = -1;      // Bal oldal
            else if (touchX > 500) touchSteer = 1;  // Jobb oldal
            else touchSteer = 0;
            e.preventDefault();
        }

        function resetGame() {
            distance = 0; speed = 0; score = 0; isGameOver = false; isGameWon = false;
            playerX = 0; steering = 0; roadCurve = 0; targetCurve = 0; objects = [];
            lastTime = Date.now();
            update();
        }

        function spawnObject() {
            let isOpponent = Math.random() < 0.4; // 40% eséllyel egy másik autó jön szembe
            let side = Math.random() < 0.5 ? -1.2 : 1.2; // Ha tereptárgy, az út szélére rakjuk
            
            objects.push({
                x: isOpponent ? (Math.random() * 1.4 - 0.7) : side, // Az út közepén vagy szélén
                z: 1, // Messziről indul
                isCar: isOpponent,
                color: isOpponent ? `hsl(${Math.random() * 360}, 80%, 50%)` : "#2e7d32" // Autó színe vagy fa zöldje
            });
        }

        function update() {
            if (isGameOver || isGameWon) return;

            let now = Date.now();
            let dt = (now - lastTime) / 1000;
            lastTime = now;

            // Gyorsulás automatikusan előre
            if (speed < maxSpeed) speed += 60 * dt;
            distance += (speed * 0.1) * dt;

            if (distance >= targetDistance) {
                isGameWon = true;
            }

            // Út kanyarodásának generálása időközönként
            curveTimer += dt;
            if (curveTimer > 2.5) {
                targetCurve = Math.random() * 3 - 1.5; // Kanyar erőssége balra vagy jobbra
                curveTimer = 0;
            }
            roadCurve += (targetCurve - roadCurve) * 2 * dt;

            // Kormányzás (Gép vagy Teló alapján)
            let currentMove = 0;
            if (keys["ArrowLeft"] || touchSteer === -1) { currentMove = -1.5; steering += (-0.2 - steering) * 0.1; }
            else if (keys["ArrowRight"] || touchSteer === 1) { currentMove = 1.5; steering += (0.2 - steering) * 0.1; }
            else { steering += (0 - steering) * 0.1; }

            // A kanyar ereje sodorja ki az autót, a kormányzással ellensúlyozzuk
            playerX += currentMove * dt;
            playerX -= (roadCurve * (speed / maxSpeed)) * 0.5 * dt;

            // Ha túlhalad az út szélén (fűre megy és fának megy)
            if (Math.abs(playerX) > 1.8) {
                isGameOver = true;
            }

            // Tereptárgyak mozgatása közeledve felénk
            spawnTimer += dt;
            if (spawnTimer > 0.4) { spawnObject(); spawnTimer = 0; }

            objects.forEach((obj, index) => {
                obj.z -= 1.2 * (speed / maxSpeed) * dt; // Közeledik a z tengelyen
                obj.x -= roadCurve * 0.8 * dt; // Kanyarodik az objektum az úttal együtt

                // Ha eléri a képernyő alját (elhaladtunk mellette)
                if (obj.z <= 0.05) {
                    // Ütközésvizsgálat ha autó jött szembe
                    if (obj.isCar && Math.abs(obj.x - playerX) < 0.4) {
                        isGameOver = true;
                    } else if (obj.isCar) {
                        score += 100; // Sikeres kikerülésért pont jár!
                    }
                    objects.splice(index, 1);
                }
            });

            // --- RAJZOLÁS ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. ÉGBOLT ÉS HEGYEK
            ctx.fillStyle = "#87ceeb"; ctx.fillRect(0, 0, canvas.width, 240);
            ctx.fillStyle = "#ffdd67"; ctx.beginPath(); ctx.arc(canvas.width / 2 + (roadCurve * 50), 120, 40, 0, Math.PI * 2); ctx.fill(); // Nap

            // Hegyek a háttérben
            ctx.fillStyle = "#4a5568";
            ctx.beginPath();
            ctx.moveTo(0, 240); ctx.lineTo(200, 150); ctx.lineTo(400, 240);
            ctx.lineTo(550, 130); ctx.lineTo(800, 240); ctx.closePath(); ctx.fill();

            // 2. FŰ (Talaj)
            ctx.fillStyle = "#34a853"; ctx.fillRect(0, 240, canvas.width, canvas.height - 240);

            // 3. AZ ÚT MEGRAJZOLÁSA PERSPEKTÍVÁBAN (3D-s hatás)
            let horizonY = 240;
            for (let i = canvas.height - 180; i > horizonY; i -= 4) {
                let perspective = (i - horizonY) / (canvas.height - 180); // 0-tól 1-ig terjedő skála
                
                let currentCenter = (canvas.width / 2) + (roadCurve * (1 - perspective) * 180) - (playerX * perspective * 250);
                let roadWidth = 30 + (perspective * 380);

                // Úttest színe váltakozva a sebességérzetért (csíkok az úton)
                let isLight = Math.floor(distance * 0.4 + i * 0.1) % 2 === 0;
                ctx.fillStyle = isLight ? "#424242" : "#303030";
                
                ctx.fillRect(currentCenter - roadWidth / 2, i, roadWidth, 4);

                // Útszéli kerékvetők (piros-fehér csíkok)
                ctx.fillStyle = isLight ? "#ffffff" : "#ea4335";
                ctx.fillRect(currentCenter - roadWidth / 2 - (8 * perspective), i, 8 * perspective, 4);
                ctx.fillRect(currentCenter + roadWidth / 2, i, 8 * perspective, 4);

                // Fehér szaggatott vonal középen
                if (isLight) {
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(currentCenter - 2, i, 4, 4);
                }
            }

            // 4. OBJEKTUMOK RAJZOLÁSA (Fák és Autók)
            objects.sort((a, b) => b.z - a.z); // Távolabbiakat rajzoljuk először
            objects.forEach(obj => {
                let perspective = 1 / obj.z;
                if (obj.z > 0.05 && obj.z < 1) {
                    let screenY = horizonY + (1 - obj.z) * 130;
                    let screenX = (canvas.width / 2) + (obj.x - playerX) * (1 - obj.z) * 450 + (roadCurve * obj.z * 100);
                    let size = 15 + (1 - obj.z) * 110;

                    if (screenX > -100 && screenX < canvas.width + 100) {
                        if (!obj.isCar) {
                            // FA rajzolása
                            ctx.fillStyle = "#5c4033"; // Törzs
                            ctx.fillRect(screenX - size*0.1, screenY - size*0.5, size*0.2, size*0.5);
                            ctx.fillStyle = obj.color; // Lombok
                            ctx.beginPath(); ctx.arc(screenX, screenY - size*0.5, size*0.35, 0, Math.PI*2); ctx.fill();
                        } else {
                            // ELLENSÉGES AUTÓ rajzolása hátulról/szemből
                            ctx.fillStyle = obj.color;
                            ctx.fillRect(screenX - size*0.4, screenY - size*0.3, size*0.8, size*0.3); // Karosszéria
                            ctx.fillStyle = "#000";
                            ctx.fillRect(screenX - size*0.35, screenY, size*0.15, size*0.08); // Kerekek
                            ctx.fillRect(screenX + size*0.2, screenY, size*0.15, size*0.08);
                            ctx.fillStyle = "#fff"; // Szélvédő
                            ctx.fillRect(screenX - size*0.3, screenY - size*0.25, size*0.6, size*0.1);
                        }
                    }
                }
            });

            // 5. BELSŐ NÉZET: AUTÓ MŰSZERFAL ÉS SZÉLVÉDŐ (COCKPIT EFFECT)
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height - 40);
            ctx.rotate(steering * 0.5); // A műszerfal enyhén dől kanyarodáskor

            // Kormánykerék és műszerfal alapja
            ctx.fillStyle = "#151b26";
            ctx.beginPath();
            ctx.moveTo(-450, 100); ctx.lineTo(-280, -90); ctx.lineTo(280, -90); ctx.lineTo(450, 100);
            ctx.closePath(); ctx.fill();

            // Műszerek (Sebességmérő kör)
            ctx.fillStyle = "#0d1117"; ctx.beginPath(); ctx.arc(-100, -10, 40, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#ff3366"; ctx.lineWidth = 3; ctx.stroke();
            ctx.fillStyle = "#ff3366"; ctx.font = "bold 14px Arial"; ctx.fillText(Math.round(speed) + " KM/H", -130, -5);

            // GPS / Térkép kijelző középen
            ctx.fillStyle = "#000"; ctx.fillRect(-30, -40, 70, 50);
            ctx.strokeStyle = "#00ff66"; ctx.lineWidth = 2; ctx.strokeRect(-30, -40, 70, 50);
            ctx.fillStyle = "#00ff66"; ctx.font = "9px 'Courier New'"; ctx.fillText("TÁV: " + Math.round(distance) + "m", -25, -15);

            // Kormánykerék (Körív)
            ctx.strokeStyle = "#222"; ctx.lineWidth = 18;
            ctx.beginPath(); ctx.arc(0, 40, 100, Math.PI, 0); ctx.stroke();
            ctx.fillStyle = "#ff3366"; ctx.fillRect(-15, 30, 30, 15); // Kormány közepe

            ctx.restore();

            // 6. HUD (Feliratok a kijelző tetején)
            ctx.fillStyle = "#ffffff"; ctx.font = "bold 18px 'Courier New'";
            ctx.fillText("TÁVOLSÁG: " + Math.round(distance) + " / " + targetDistance + " m", 30, 45);
            ctx.fillStyle = "#ffcc00"; ctx.fillText("PONT: " + score, 30, 75);

            // PROGRESS BAR (Haladási csík legfelül)
            ctx.fillStyle = "rgba(255,255,255,0.2)"; ctx.fillRect(30, 95, 200, 10);
            ctx.fillStyle = "#00ff66"; ctx.fillRect(30, 95, (distance / targetDistance) * 200, 10);

            // GAME OVER KÉPERNYŐ
            if (isGameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff3333"; ctx.font = "bold 40px 'Courier New'";
                ctx.fillText("Balesetet szenvedtél! 💥", 150, 200);
                ctx.fillStyle = "#fff"; ctx.font = "20px 'Courier New'";
                ctx.fillText("Elért pontszám: " + score, 280, 260);
                ctx.fillStyle = "#ffaa00"; ctx.font = "bold 22px 'Courier New'";
                ctx.fillText("👉 ÉRINTSD MEG A KÉPERNYŐT AZ ÚJRAKEZDÉSHEZ", 100, 350);
            }

            // GYŐZELEM KÉPERNYŐ
            if (isGameWon) {
                ctx.fillStyle = "rgba(11, 25, 11, 0.9)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#00ff66"; ctx.font = "bold 44px 'Courier New'";
                ctx.fillText("CÉLBA ÉRTÉL! 🏆🏎️", 200, 200);
                ctx.fillStyle = "#ffcc00"; ctx.font = "24px 'Courier New'";
                ctx.fillText("Végső pontszámod: " + score, 250, 270);
                ctx.fillStyle = "#fff"; ctx.font = "18px Arial";
                ctx.fillText("Érintsd meg a képernyőt egy új futamhoz!", 230, 360);
            }

            if (!isGameOver && !isGameWon) {
                requestAnimationFrame(update);
            }
        }

        update();
    </script>

</body>
</html>
