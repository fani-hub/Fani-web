<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Budapest Airborne - 1944 (V2)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Georgia', serif; }
        canvas { display: block; }

        /* JÁTÉKOS HUD */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: none;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.8); border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        #health-status {
            position: absolute; bottom: 40px; left: 40px; color: #fff;
            background: rgba(0,0,0,0.6); padding: 15px; border-left: 5px solid #c00;
        }
        #ammo-status {
            position: absolute; bottom: 40px; right: 40px; color: #fff;
            font-size: 24px; background: rgba(0,0,0,0.6); padding: 15px;
        }

        /* LASSÚ ELHALVÁNYULÁS (FADE TO BLACK) */
        #fade-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; opacity: 0; pointer-events: none;
            transition: opacity 2.5s ease-in-out; z-index: 1000;
        }

        /* KATONA ADATLAP (Halál után) */
        #soldier-report {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #d2b48c; color: #222; padding: 30px; border: 4px solid #5d4037;
            display: none; z-index: 1001; box-shadow: 0 0 50px #000; width: 350px;
        }

        /* MENÜ */
        #menu {
            position: absolute; width: 100%; height: 100%; background: #111;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #d4af37; z-index: 2000;
        }
        .difficulty-btn {
            background: #333; color: #d4af37; border: 2px solid #d4af37;
            padding: 15px 30px; margin: 10px; cursor: pointer; font-size: 18px;
            width: 250px; transition: 0.3s;
        }
        .difficulty-btn:hover { background: #d4af37; color: #000; }

        /* FÜLCSENGÉS EFFEKT (Blur) */
        .shell-shock { filter: blur(4px) grayscale(0.5); }
    </style>
</head>
<body>

<div id="fade-overlay"></div>
<div id="soldier-report">
    <h3 style="text-align:center; border-bottom: 1px solid #000;">BEVETÉSI JELENTÉS</h3>
    <p><strong>Név:</strong> <span id="soldier-name">Vitéz Nagy István</span></p>
    <p><strong>Rang:</strong> Szakaszvezető</p>
    <p><strong>Állapot:</strong> <span style="color:red;">Elesett a harcban</span></p>
    <p style="font-size: 12px; margin-top: 20px;"><em>A következő egység hamarosan a zónába érkezik...</em></p>
</div>

<div id="menu">
    <h1>MEDAL OF HONOR: AIRBORNE</h1>
    <h2>BUDAPEST, 1944</h2>
    <button class="difficulty-btn" onclick="startGame('Easy')">KÖNNYŰ (Zöldfülű)</button>
    <button class="difficulty-btn" onclick="startGame('Medium')">KÖZEPES (Katona)</button>
    <button class="difficulty-btn" onclick="startGame('Hard')">NEHÉZ (Veterán)</button>
</div>

<div id="ui-layer">
    <div id="crosshair"></div>
    <div id="health-status">ÉLETERŐ: 100%</div>
    <div id="ammo-status">MP40 | 32 / 128</div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // GLOBÁLIS VÁLTOZÓK
    let scene, camera, renderer, clock;
    let isDead = false, health = 100;
    let difficulty = 'Medium';
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let velocity = new THREE.Vector3();
    let direction = new THREE.Vector3();

    // JÁTÉK INDÍTÁSA
    window.startGame = function(level) {
        difficulty = level;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('ui-layer').style.display = 'block';
        init();
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Élethű kék ég
        scene.fog = new THREE.Fog(0x87ceeb, 20, 500);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        clock = new THREE.Clock();

        // FÉNYEK
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfffaf0, 1.2);
        sunLight.position.set(50, 100, 50);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // ALAP TALAJ
        const groundGeo = new THREE.PlaneGeometry(2000, 2000);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        setupControls();
        spawnPlayer();
        animate();
    }
  // 2. RÉSZ: MOZGÁS, UGRÁS ÉS ÉLETHŰ KATONÁK

    let isAiming = false;
    let enemies = [];
    let buildings = [];

    function setupControls() {
        const onKeyDown = (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
                case 'ShiftLeft': velocity.multiplyScalar(1.5); break; // Sprint
                case 'Space': if (!isDead && camera.position.y < 3) velocity.y += 10; break;
            }
        };
        const onKeyUp = (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // Egér irányítás (Pointer Lock)
        document.addEventListener('mousedown', () => {
            if (document.pointerLockElement !== document.body) document.body.requestPointerLock();
        });
        
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });
    }

    function spawnPlayer() {
        isDead = false;
        health = 100;
        camera.position.set(0, 400, 100); // Magasról indul az ugrás
        camera.rotation.set(0, 0, 0);
        updateHUD();
    }

    // ÉLETHŰ NÉMET KATONA MODELL (Végtagokkal)
    function createSoldierNPC(x, z) {
        const soldierGroup = new THREE.Group();
        const clothMat = new THREE.MeshStandardMaterial({ color: 0x4b5320 }); // Német tábori zöld
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xdbac82 });

        // Törzs
        const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.8, 4, 8), clothMat);
        torso.position.y = 1.1;
        soldierGroup.add(torso);

        // Fej + Sisak (Stahlhelm forma)
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), skinMat);
        head.position.y = 1.8;
        head.name = "head";
        soldierGroup.add(head);

        const helmet = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.25, 0.15, 16), new THREE.MeshStandardMaterial({color: 0x333333}));
        helmet.position.y = 1.9;
        soldierGroup.add(helmet);

        // Karok és Lábak
        const limbGeo = new THREE.CapsuleGeometry(0.1, 0.6, 4, 8);
        const lArm = new THREE.Mesh(limbGeo, clothMat); lArm.position.set(-0.4, 1.3, 0);
        const rArm = new THREE.Mesh(limbGeo, clothMat); rArm.position.set(0.4, 1.3, 0);
        const lLeg = new THREE.Mesh(limbGeo, clothMat); lLeg.position.set(-0.2, 0.4, 0);
        const rLeg = new THREE.Mesh(limbGeo, clothMat); rLeg.position.set(0.2, 0.4, 0);
        
        soldierGroup.add(lArm, rArm, lLeg, rLeg);

        soldierGroup.position.set(x, 0, z);
        soldierGroup.hp = 100;
        
        // Találati logika (Hitbox)
        soldierGroup.onHit = function(zone) {
            let dmg = 25;
            if (zone === "head") dmg = 100; // Fejlövés
            this.hp -= dmg;
            if (this.hp <= 0) {
                this.rotation.x = -Math.PI / 2; // Eldőlés
                setTimeout(() => scene.remove(this), 5000);
            }
        };

        scene.add(soldierGroup);
        enemies.push(soldierGroup);
    }

    // BUDAPESTI HÁZAK (Landolható tetőkkel)
    function createBuilding(x, z, h) {
        const buildGroup = new THREE.Group();
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x998877 });
        
        const body = new THREE.Mesh(new THREE.BoxGeometry(15, h, 15), wallMat);
        body.position.y = h / 2;
        body.castShadow = true;
        body.receiveShadow = true;
        buildGroup.add(body);

        // Tető (ahol landolni lehet)
        const roof = new THREE.Mesh(new THREE.BoxGeometry(16, 0.5, 16), new THREE.MeshStandardMaterial({color: 0x444444}));
        roof.position.y = h;
        buildGroup.add(roof);

        buildGroup.position.set(x, 0, z);
        scene.add(buildGroup);
        buildings.push(body);
    }

    // Város feltöltése
    for(let i=0; i<10; i++) {
        createBuilding(Math.random()*100-50, Math.random()*-300, Math.random()*20+10);
        createSoldierNPC(Math.random()*40-20, Math.random()*-100-20);
    }

    function updateHUD() {
        document.getElementById('health-status').innerText = "ÉLETERŐ: " + health + "%";
        document.getElementById('health-status').style.width = health + "%";
    }
  // 3. RÉSZ: FEGYVEREK, ZÖLD FÜST ÉS A HALÁL MECHANIKA

    let weaponGroup = new THREE.Group();
    let isSprinting = false;

    // ZÖLD FÜST GENERÁLÁSA (Safe Zones)
    function createGreenSmoke(x, z) {
        const smokeCount = 20;
        const smokeGroup = new THREE.Group();
        const smokeGeo = new THREE.SphereGeometry(0.5, 8, 8);
        const smokeMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ff00, 
            transparent: true, 
            opacity: 0.4 
        });

        for (let i = 0; i < smokeCount; i++) {
            const particle = new THREE.Mesh(smokeGeo, smokeMat);
            particle.position.set(Math.random() * 2 - 1, i * 0.5, Math.random() * 2 - 1);
            particle.userData = { speed: 0.02 + Math.random() * 0.02 };
            smokeGroup.add(particle);
        }
        smokeGroup.position.set(x, 0, z);
        scene.add(smokeGroup);
        
        // Füst animáció a globális ciklushoz
        smokeGroup.update = function() {
            smokeGroup.children.forEach(p => {
                p.position.y += p.userData.speed;
                p.scale.multiplyScalar(1.005);
                if (p.position.y > 10) {
                    p.position.y = 0;
                    p.scale.set(1, 1, 1);
                }
            });
        };
        return smokeGroup;
    }

    const safeZone1 = createGreenSmoke(10, -50);

    // ÉLETHŰ MP40 MODELL A KÉZBE
    function setupWeapon() {
        const ironMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.2, 0.8), ironMat);
        const magazine = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.4, 0.1), ironMat);
        magazine.position.set(0, -0.2, -0.2);
        
        weaponGroup.add(body, magazine);
        weaponGroup.position.set(0.4, -0.4, -0.8);
        camera.add(weaponGroup);
        scene.add(camera);
    }

    // LÖVÉS MECHANIKA TORKOLATTŰZZEL
    function shoot() {
        if (isDead || document.pointerLockElement !== document.body) return;

        // Visszarúgás
        camera.rotation.x += 0.02;
        weaponGroup.position.z += 0.05;

        // Torkolattűz (villanás)
        const flash = new THREE.PointLight(0xffaa00, 10, 5);
        flash.position.copy(camera.position);
        scene.add(flash);
        setTimeout(() => scene.remove(flash), 40);

        // Találat ellenőrzés
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
        const intersects = raycaster.intersectObjects(enemies, true);

        if (intersects.length > 0) {
            let target = intersects[0].object;
            while(target.parent && !target.onHit) target = target.parent;
            if (target.onHit) {
                const zone = intersects[0].point.y > 1.7 ? "head" : "body";
                target.onHit(zone);
            }
        }
    }

    // A KÉRT LASSÚ SÖTÉTEDÉS ÉS ÚJRAUGRÁS
    function playerDie() {
        if (isDead) return;
        isDead = true;

        // 1. Lassú sötétedés indítása
        const overlay = document.getElementById('fade-overlay');
        overlay.style.opacity = '1';

        // 2. Fülcsengés (vizuális blur)
        document.body.classList.add('shell-shock');

        setTimeout(() => {
            // 3. Katona adatlap felvillanása 1 másodpercre
            document.getElementById('soldier-report').style.display = 'block';
            
            setTimeout(() => {
                // 4. Vissza az égbe!
                document.getElementById('soldier-report').style.display = 'none';
                document.body.classList.remove('shell-shock');
                spawnPlayer();
                overlay.style.opacity = '0';
            }, 1000);
        }, 2500); // 2.5 másodperc alatt sötétül el teljesen
    }

    // EGÉR ESEMÉNYEK
    document.addEventListener('mousedown', (e) => {
        if (e.button === 0) shoot();
        if (e.button === 2) { camera.fov = 40; camera.updateProjectionMatrix(); } // Célzás
    });
    document.addEventListener('mouseup', (e) => {
        if (e.button === 2) { camera.fov = 75; camera.updateProjectionMatrix(); }
    });

    // ANIMÁCIÓS CIKLUS FRISSÍTÉSE
    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (!isDead) {
            // UGRÁS ÉS MOZGÁS FIZIKA
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;
            
            // Ha a levegőben vagyunk (UGRÁS)
            if (camera.position.y > 2) {
                velocity.y -= 0.5 * 10.0 * delta; // Lassabb zuhanás (ernyő)
            } else {
                velocity.y = 0;
            }

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

            camera.translateX(-velocity.x * delta);
            camera.translateZ(-velocity.z * delta);
            camera.position.y += (velocity.y * delta);

            // Fegyver visszahúzódása lövés után
            weaponGroup.position.z = THREE.MathUtils.lerp(weaponGroup.position.z, -0.8, 0.1);
            
            // Füst frissítése
            if(safeZone1.update) safeZone1.update();
        }

        renderer.render(scene, camera);
    }

    setupWeapon();
  // 4. RÉSZ: A PARLAMENT, A PÁRDUC TANK ÉS A TAPADÓGRÁNAT

    let tanks = [];

    // A PARLAMENT ÉPÜLETE (Részletesebb kivitel)
    function createParliamentComplex(x, z) {
        const parlGroup = new THREE.Group();
        const stoneMat = new THREE.MeshStandardMaterial({ color: 0xeae0c8 }); // Mészkő hatás
        const roofMat = new THREE.MeshStandardMaterial({ color: 0x333333 });

        // Főépület test
        const body = new THREE.Mesh(new THREE.BoxGeometry(80, 20, 40), stoneMat);
        body.position.y = 10;
        parlGroup.add(body);

        // Oszlopsor (Duna felőli oldal)
        const colGeo = new THREE.CylinderGeometry(0.3, 0.3, 15, 12);
        for (let i = -35; i <= 35; i += 4) {
            const col = new THREE.Mesh(colGeo, stoneMat);
            col.position.set(i, 7.5, 20.5);
            parlGroup.add(col);
        }

        // Kupola alap és a csúcs
        const domeBase = new THREE.Mesh(new THREE.CylinderGeometry(10, 12, 8, 16), stoneMat);
        domeBase.position.y = 24;
        parlGroup.add(domeBase);

        const domeTop = new THREE.Mesh(new THREE.SphereGeometry(10, 20, 20, 0, Math.PI * 2, 0, Math.PI / 2), roofMat);
        domeTop.position.y = 28;
        parlGroup.add(domeTop);

        parlGroup.position.set(x, 0, z);
        scene.add(parlGroup);
        buildings.push(body, domeBase); // Landolható felületek
    }

    // PÁRDUC TANK LÉTREHOZÁSA ÉS AI
    function createPantherTank(x, z) {
        const tankGroup = new THREE.Group();
        const camMat = new THREE.MeshStandardMaterial({ color: 0x4b5320 }); // Terepszín

        // Alváz
        const hull = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 7), camMat);
        hull.position.y = 1;
        tankGroup.add(hull);

        // Torony
        const turret = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1, 3), camMat);
        turret.position.set(0, 2.2, -0.5);
        tankGroup.add(turret);

        // Ágyúcső
        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 4), camMat);
        barrel.rotation.x = Math.PI / 2;
        barrel.position.set(0, 2.2, 2.5);
        tankGroup.add(barrel);

        tankGroup.position.set(x, 0, z);
        scene.add(tankGroup);

        const tankAI = {
            mesh: tankGroup,
            turret: turret,
            health: 200,
            speed: 0.05,
            update: function() {
                // Lassan előre halad
                tankGroup.translateZ(this.speed);
                
                // Ha közel a játékos, felé fordul a torony
                const dist = tankGroup.position.distanceTo(camera.position);
                if (dist < 40) {
                    turret.lookAt(camera.position.x, 2.2, camera.position.z);
                    if (Math.random() < 0.01) tankFire(tankGroup.position);
                }
            }
        };
        tanks.push(tankAI);
    }

    function tankFire(pos) {
        console.log("TANK TÜZEL!");
        // Robbanás effekt a játékosnál, ha eltalálja
        if (camera.position.distanceTo(pos) < 10) {
            takeDamage(50, 'explosion');
        }
    }

    // TAPADÓGRÁNÁT DOBÁSA (Gammon Grenade)
    function throwStickyGrenade() {
        const grenade = new THREE.Mesh(
            new THREE.SphereGeometry(0.2, 8, 8),
            new THREE.MeshStandardMaterial({ color: 0x111111 })
        );
        grenade.position.copy(camera.position);
        scene.add(grenade);

        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        let gVelocity = dir.multiplyScalar(15);
        
        const gInterval = setInterval(() => {
            gVelocity.y -= 0.2; // Gravitáció
            grenade.position.add(gVelocity.clone().multiplyScalar(0.05));

            // Tank eltalálása
            tanks.forEach(t => {
                if (grenade.position.distanceTo(t.mesh.position) < 2) {
                    clearInterval(gInterval);
                    scene.remove(grenade);
                    t.health -= 100;
                    console.log("Tank találat! HP: " + t.health);
                    if (t.health <= 0) {
                        createExplosion(t.mesh.position);
                        scene.remove(t.mesh);
                    }
                }
            });

            if (grenade.position.y < 0) {
                clearInterval(gInterval);
                scene.remove(grenade);
            }
        }, 30);
    }

    function createExplosion(pos) {
        const expLight = new THREE.PointLight(0xff4500, 50, 20);
        expLight.position.copy(pos);
        scene.add(expLight);
        setTimeout(() => scene.remove(expLight), 300);
    }

    // Billentyűzet esemény a gránáthoz
    document.addEventListener('keydown', (e) => {
        if (e.code === 'KeyG') throwStickyGrenade();
    });

    // Építkezés és tankok lehelyezése
    createParliamentComplex(0, -200);
    createPantherTank(10, -80);
    createPantherTank(-15, -150);

    // Bővített animációs ciklus
    const oldAnimateV4 = animate;
    animate = function() {
        tanks.forEach(t => t.update());
        oldAnimateV4();
    };

    function takeDamage(amount, type) {
        health -= amount;
        updateHUD();
        if (type === 'explosion') {
            document.body.classList.add('shell-shock');
            setTimeout(() => document.body.classList.remove('shell-shock'), 3000);
        }
        if (health <= 0) playerDie();
    }
  // 5. RÉSZ: MAGYAR SZINKRON MOTOR ÉS DINAMIKUS IDŐJÁRÁS (ESŐ)

    // MAGYAR SZINKRON RENDSZER
    // A Medal of Honor: Airborne-ban a karakterek folyamatosan beszéltek. 
    // Ez a kód véletlenszerűen választ a magyar mondatok közül.
    const hungarianSpeech = {
        combat: [
            "Ellenség a láthatáron!", 
            "Tüzet nyiss!", 
            "Fedezéket keresni!", 
            "A hazáért, fiúk!"
        ],
        reload: [
            "Töltök, fedezzetek!", 
            "Kifogyott a táram!", 
            "Újratöltök!"
        ],
        kill: [
            "Eltaláltam!", 
            "Ez megvolt!", 
            "Egyel kevesebb náci!"
        ],
        hurt: [
            "Áhh, eltaláltak!", 
            "Szanitécet!", 
            "Kaptam egyet!"
        ]
    };

    function playVoice(category) {
        const phrases = hungarianSpeech[category];
        const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
        
        // Kiírjuk a képernyőre is (mint a felirat), amíg nincsenek külső mp3 fájljaid
        const subtitle = document.createElement('div');
        subtitle.style.cssText = "position:absolute; bottom:120px; width:100%; text-align:center; color:#d4af37; font-weight:bold; text-shadow:2px 2px #000; font-size:20px; pointer-events:none;";
        subtitle.innerText = "MAGYAR KATONA: " + randomPhrase;
        document.body.appendChild(subtitle);
        
        console.log("%c [SZINKRON]: " + randomPhrase, "color: #d4af37; font-style: italic;");
        
        setTimeout(() => subtitle.remove(), 2500);
    }

    // DINAMIKUS ESŐ RENDSZER (A Parlament ostromához)
    let rainParticles;
    function setupRain() {
        const rainGeo = new THREE.BufferGeometry();
        const rainCount = 8000;
        const positions = new Float32Array(rainCount * 3);

        for (let i = 0; i < rainCount * 3; i += 3) {
            positions[i] = Math.random() * 200 - 100;
            positions[i+1] = Math.random() * 100;
            positions[i+2] = Math.random() * 200 - 100;
        }

    function applyWeaponSway(delta, time) {
        if (isDead) return;

        // Alap imbolygás légzés közben
        let swayX = Math.sin(time * 1.5) * 0.005;
        let swayY = Math.cos(time * 1.5) * 0.005;

        // Mozgás közbeni imbolygás
        if (moveForward || moveBackward || moveLeft || moveRight) {
            let mult = isSprinting ? 2 : 1;
            swayX += Math.sin(time * 10) * 0.02 * mult;
            swayY += Math.abs(Math.cos(time * 10)) * 0.02 * mult;
        }

        // Kihajolás (Lean) számítása
        if (isLeaningLeft) leanOffset = THREE.MathUtils.lerp(leanOffset, 0.5, 0.1);
        else if (isLeaningRight) leanOffset = THREE.MathUtils.lerp(leanOffset, -0.5, 0.1);
        else leanOffset = THREE.MathUtils.lerp(leanOffset, 0, 0.1);

        weaponGroup.position.x = 0.4 + swayX + (leanOffset * -0.2);
        weaponGroup.position.y = -0.4 + swayY;
        camera.position.x += leanOffset * 0.05; // Maga a kamera is elmozdul
    }

    function firePanzerfaust() {
        if (panzerfaustAmmo <= 0) return;
        panzerfaustAmmo--;
        
        console.log("%c [FEGYVER]: Páncélököl elsütve!", "color: #ffaa00; font-weight: bold;");
        playVoice('combat');

        const rocket = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), new THREE.MeshBasicMaterial({color: 0xffcc00}));
        rocket.position.copy(camera.position);
        scene.add(rocket);

        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        let rVel = dir.multiplyScalar(25);

        const rInterval = setInterval(() => {
            rocket.position.add(rVel.clone().multiplyScalar(0.05));
            
            // Füstcsík a rakéta után
            const smoke = new THREE.Mesh(new THREE.SphereGeometry(0.1, 4, 4), new THREE.MeshBasicMaterial({color: 0xaaaaaa, transparent: true, opacity: 0.5}));
            smoke.position.copy(rocket.position);
            scene.add(smoke);
            setTimeout(() => scene.remove(smoke), 500);

            // Ütközés tankkal vagy fallal
            tanks.forEach(t => {
                if (rocket.position.distanceTo(t.mesh.position) < 3) {
                    explodeRocket(rocket.position, 150);
                    t.health -= 200;
                    if(t.health <= 0) scene.remove(t.mesh);
                    clearInterval(rInterval);
                    scene.remove(rocket);
                }
            });

            if (rocket.position.y < 0 || rocket.position.z < -500) {
                explodeRocket(rocket.position, 50);
                clearInterval(rInterval);
                scene.remove(rocket);
            }
        }, 20);
    }

    function updateCompass() {
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        const angle = Math.atan2(dir.x, dir.z) * (180 / Math.PI);
        const compass = document.getElementById('compass');
        if (compass) {
            let bearing = "N";
            if (angle > -45 && angle <= 45) bearing = "S";
            else if (angle > 45 && angle <= 135) bearing = "W";
            else if (angle > -135 && angle <= -45) bearing = "E";
            compass.innerText = `[ ${bearing} ] ${Math.round(Math.abs(angle))}°`;
        }
    }

        for (let i = 0; i < particleCount; i++) {

    // 2. FEGYVER ELAKADÁS (Jamming)
    function checkJamming() {
        if (Math.random() < 0.01) { // 1% esély minden lövésnél
            isWeaponJamming = true;
            console.log("%c [HIBA]: A fegyver elakadt! Nyomj [R]-t a javításhoz!", "color: #ffaa00; font-weight: bold;");
            // HUD-on jelezzük
            document.getElementById('ammo-status').innerHTML = `<span style="color:red; font-weight:bold;">ELAKADT! (R)</span>`;
            return true;
        }
        return false;

    // 3. LÖVÉS LOGIKA FRISSÍTÉSE
    const oldShootV21 = shoot;
    shoot = function() {
        let curWep = weaponInventory[currentWeaponIndex];
        
        if (isWeaponJamming) return; // Nem lő, ha elakadt
        if (curWep.ammo <= 0) {
            playVoice('combat'); // Kattogás hang
            return;
        }

        if (checkJamming()) return;

        curWep.ammo--;
        updateWeaponHUD();
        oldShootV21();
    };

    // 4. ÚJRATÖLTÉS ÉS ELAKADÁS JAVÍTÁSA
    function reloadWeapon() {
        let curWep = weaponInventory[currentWeaponIndex];
        
        if (isWeaponJamming) {
            isWeaponJamming = false;
            console.log("Fegyver megtisztítva.");
            updateWeaponHUD();
            return;
        }

        if (curWep.totalAmmo > 0) {
            let needed = curWep.maxClip - curWep.ammo;
            if (curWep.totalAmmo !== Infinity) {
                let toAdd = Math.min(needed, curWep.totalAmmo);
                curWep.ammo += toAdd;
                curWep.totalAmmo -= toAdd;
            } else {
                curWep.ammo = curWep.maxClip; // Pisztoly végtelen
            }
            updateWeaponHUD();
        }
    }

            const part = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xff4400, transparent: true, opacity: 0.8}));
            part.position.copy(fromPos);
            scene.add(part);

            const flameInt = setInterval(() => {
                part.position.add(dir.multiplyScalar(0.3));
                part.scale.multiplyScalar(1.1);
                part.material.opacity -= 0.05;
                
                if (part.position.distanceTo(camera.position) < 1.5) takeDamage(5, 'fire');

                    clearInterval(flameInt);
                    scene.remove(part);
                }

    // 2. SZILÁNKOSODÓ TÁRGYAK (Vázák, Ládák)
    function spawnBreakableObject(x, z, type) {
        const objGeo = (type === 'vase') ? new THREE.CylinderGeometry(0.3, 0.2, 0.8) : new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const objMat = new THREE.MeshStandardMaterial({ color: (type === 'vase') ? 0x2255aa : 0x553311 });
        const obj = new THREE.Mesh(objGeo, objMat);
        
        obj.position.set(x, 0.4, z);
        obj.userData = { isDestructible: true, type: type, health: 20 };
        scene.add(obj);
        destructibles.push(obj);
        buildings.push(obj);
    }

    // 3. TÁRGYAK ROMBOLÁSA (Lövéskezelő kiegészítés)
    function handleDestruction(target) {
        if (!target.userData) return;
        
        if (target.userData.isChandelier && !target.userData.fallen) {
            target.userData.fallen = true;
            // Fizikai zuhanás
            let fallVel = 0;
            const fallInt = setInterval(() => {
                fallVel += 0.02;
                target.position.y -= fallVel;
                if (target.position.y <= 0.5) {
                    target.position.y = 0.5;
                    clearInterval(fallInt);
                    createExplosion(target.position); // Összetörés effekt
                    applyCameraShake(0.2);
                }
            }, 20);
        }

        if (target.userData.isDestructible) {
            target.userData.health -= 10;
            if (target.userData.health <= 0) {
                // Szilánkokra esik
                impactEffect(target.position, new THREE.Vector3(0,1,0));
                scene.remove(target);
                // Eltávolítjuk a listákból
                destructibles = destructibles.filter(d => d !== target);
            }
        }
    }

    // 1. PONTOS SEBZÉS SZÁMÍTÁS (Távolság és Találati hely)
    function calculateDamage(baseDmg, dist, isHeadshot) {
        let finalDmg = baseDmg;
        
        // Távolsági csillapítás (50 méter után gyengül)
        if (dist > 50) {
            finalDmg *= Math.max(0.3, 1 - (dist / 150));
        }
        
        // Fejlövés szorzó
        if (isHeadshot) finalDmg *= 2.5;
        
        return finalDmg;
    }

    // 2. JÁTÉKOS SÉRÜLÉS ÉS LÖKÉSHULLÁM (Shockwave)
    function takePlayerDamage(amount, type) {
        hp -= amount;
        applyCameraShake(amount / 20); // Minél nagyobb a sebzés, annál jobban rázkódik

        // Vérzés/Súlyos sérülés effekt
        if (hp < 35) {
            document.body.style.boxShadow = "inset 0 0 100px rgba(150,0,0,0.8)";
            isBleeding = true;
        }

        // Tanklövéstől való megszédülés (Vizuális Blur)
        if (type === 'tank_shell') {
            document.body.style.filter = "blur(4px) grayscale(50%)";
            setTimeout(() => {
                document.body.style.filter = "none";
            }, 2000);
        }

        if (hp <= 0) {
            console.log("MEGMEGSEMMISÜLTÉL!");
            // Itt jöhetne a Respawn logika
        }
    }

    function updateStamina() {
        const isSprinting = keys['ShiftLeft'] && (keys['KeyW'] || keys['KeyS']);
        
        if (isSprinting && stamina > 0) {
            stamina -= 0.5;
            moveSpeed = 0.25; // Gyorsabb futás
        } else {
            stamina = Math.min(100, stamina + 0.2);
            moveSpeed = 0.15;
        }

        // Ha kevés a stamina, remeg a célkereszt
        if (stamina < 30) {
            const sway = (30 - stamina) * 0.01;
            camera.rotation.z += Math.sin(performance.now() * 0.01) * sway * 0.1;
        }
    }

    function setDifficulty(level) {
        difficulty = level;

        switch(level) {
            case 'Easy':
                playerMaxHP = 200;
                npcAccuracy = 0.05; // Rosszabb célzás
                damageMultiplier = 0.5;
                break;
            case 'Medium':
                playerMaxHP = 100;
                npcAccuracy = 0.02;
                damageMultiplier = 1.0;
                break;
            case 'Hard':
                playerMaxHP = 70;
                npcAccuracy = 0.005; // Halálosan pontos
                damageMultiplier = 1.5;
                break;
        }
        hp = playerMaxHP;
    }

    // 2. EJTŐERNYŐS LESZÁLLÁS IRÁNYÍTÁSA
    function handleParachute() {
        if (!isParachuting) return;

        // Lassú ereszkedés
        camera.position.y += parachuteVeclocity;
        
        // Irányítás a levegőben (WASD)
        if (keys['KeyW']) camera.position.z -= 0.2;
        if (keys['KeyS']) camera.position.z += 0.2;
        if (keys['KeyA']) camera.position.x -= 0.2;
        if (keys['KeyD']) camera.position.x += 0.2;

        // Földet érés ellenőrzése
        if (camera.position.y <= 1.7) {
            camera.position.y = 1.7;
            isParachuting = false;
            console.log("%c [LANDOLÁS]: Megérkeztél a csatatérre!", "color: #00ff00; font-weight: bold;");

            createExplosion(camera.position); 
        }
    }

    const MAX_DECALS = 50;

        activeDecals.push(newDecal);
        if (activeDecals.length > MAX_DECALS) {
            const oldDecal = activeDecals.shift();
            scene.remove(oldDecal);
        }
    }

        if (radioDestroyedCount >= 3 && currentLevel < 2) {

            bossTankSpawned = true;
        }
